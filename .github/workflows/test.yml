name: Tests

on:
  push:
    branches: [main]
    # Pure documentation / data-content changes do not affect runtime
    # behaviour, so skip the full CI suite and preserve Actions
    # minutes for code-impacting work. A PR that touches BOTH a
    # paths-ignore entry AND a code file still triggers CI — the
    # ignore set must match every file in the change for the run
    # to be skipped, which is the correct semantic. Categories:
    #   * docs/**, **.md      — operator runbook, audit reports,
    #                           architecture notes. Pure prose.
    #   * data/findings_seed.yaml — content-only seed for the admin
    #                           findings tracker. The YAML-parse +
    #                           schema invariants are already pinned
    #                           by tests/test_admin_findings.py, so a
    #                           push that ONLY touches this file has
    #                           no behavioural surface for CI to
    #                           verify.
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'data/findings_seed.yaml'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'data/findings_seed.yaml'

# Cancel in-progress runs on the same branch when a new commit
# lands. PRs frequently receive fix-up commits or force-pushes
# after rebase; without this guard each push spawns a fresh CI
# run and the older runs continue to completion in parallel,
# burning Actions minutes for results that will be discarded as
# soon as the new run finishes. Group key includes the workflow
# name so unrelated workflows (drift detection, future ones)
# don't cancel each other.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to read-only permissions for the workflow. Individual
# jobs can opt into more if needed. Least-privilege baseline per
# OpenSSF Scorecard Token-Permissions check.
permissions: read-all

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      # fail-fast: false is now structurally redundant (the matrix
      # has one entry) but kept for forward-compat: any future
      # re-introduction of a second runtime should default to
      # surfacing both failures rather than masking one behind the
      # other.
      fail-fast: false
      matrix:
        # Single Python version: 3.12 is the production runtime on
        # Reverto-Server. Drift-detection against 3.13 (and future
        # versions) lives in `.github/workflows/python-drift.yml`
        # as a weekly scheduled run. Per-PR matrix was 2× the
        # minutes-burn for marginal extra signal — 3.12-only
        # failures already block merges; 3.13-only failures
        # historically rarely blocked deploys to a 3.12 host.
        # 3.11 was dropped earlier: pandas-ta==0.4.71b0 requires
        # 3.12+ and the codebase uses 3.10+ union syntax, so 3.11
        # support was aspirational at best.
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install core dependencies
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install ruff pip-audit pytest-cov

      - name: Smoke-import core modules
        # Audit v25 #3 guard. A production module whose dependency
        # sits in requirements.txt must import cleanly on a fresh
        # install. Caught prometheus_client + xgboost previously by
        # coincidence (tests happened to import them); this step
        # makes the guarantee explicit so a future lazy-imported
        # production path can't silently drift out of the manifest.
        # Runs BEFORE requirements-ml.txt install, so any ML-lib
        # import accidentally lifted to top level fails here.
        run: |
          .venv/bin/python -c "
          import web.app
          import web.metrics
          import web.routes.admin
          import web.routes.auth
          import web.routes.backtest
          import web.routes.bots
          import web.routes.chart
          import web.routes.deals
          import web.routes.drawdown
          import web.routes.exchanges
          import paper.paper_engine
          import paper.paper_state
          import paper.state_io
          import live.live_engine
          import live.order_reconciliation
          import core.clock_monitor
          import core.credentials
          import core.database
          import core.deal_store
          import core.drawdown_guard
          import core.ids
          import core.liquidation_guard
          import core.logging_setup
          import core.paths
          import core.schedule_guard
          import core.user
          import exchanges.base_exchange
          import exchanges.bitget
          import exchanges.kraken
          import exchanges.public_exchange
          import notifications.telegram
          import strategies.indicator_engine
          import strategies.indicators.bollinger
          import strategies.indicators.ema
          import strategies.indicators.macd
          import strategies.indicators.market_structure
          import strategies.indicators.parabolic_sar
          import strategies.indicators.qfl
          import strategies.indicators.rsi
          import strategies.indicators.supertrend
          import strategies.indicators.support_resistance
          import backtest.backtest_engine
          import backtest.backtest_report
          import ml.candle_loader
          import ml.entry_filter
          import ml.features
          import ml.market_regime
          import ml.model_io
          import ml.nightly_pipeline
          print('core smoke-import OK')
          "

      - name: Install ML dependencies
        run: .venv/bin/pip install -r requirements-ml.txt

      - name: Smoke-import ML dependencies
        # Prove that requirements-ml.txt itself resolves to a
        # usable install. The ml/ modules already imported fine in
        # the step above because their ML-lib imports are lazy
        # (ml/nightly_pipeline.py:9 explicitly calls this out);
        # this step catches a regression in the ML manifest
        # directly — a wheel going missing, a system-lib prereq
        # disappearing from the runner image, etc.
        run: |
          .venv/bin/python -c "
          import lightgbm
          import llvmlite
          import numba
          import scipy
          import sklearn
          import xgboost
          print('ml smoke-import OK')
          "

      - name: Lint (ruff)
        run: .venv/bin/ruff check .

      - name: Tests (pytest + coverage)
        # --cov-fail-under=80 catches significant coverage regressions.
        # Actual coverage is ~86% on HEAD (audit v25 measured); 80%
        # gives ~6pp buffer for small fluctuations but surfaces any
        # meaningful drop. Raise when coverage structurally climbs.
        run: |
          .venv/bin/pytest -q \
            --cov=. \
            --cov-report=term-missing:skip-covered \
            --cov-fail-under=80

      - name: Security audit — direct deps (BLOCKING)
        # A CVE in a pinned requirements*.txt dependency fails the
        # build. Direct deps are under our control — we can bump the
        # version, test, and re-run. Stop shipping known-vulnerable
        # code before it ships.
        #
        # Ignored CVEs:
        #   PYSEC-2024-277 (CVE-2024-34997) in joblib — DISPUTED
        #   false-positive per maintainer (joblib/joblib#1588) and
        #   NVD. No fix exists; Reverto only loads its own trusted
        #   ML models so the deserialization exploit path is N/A.
        #   See docs/security/cve-ignore-policy.md for the full
        #   review and links.
        run: |
          .venv/bin/pip-audit \
            --requirement requirements.txt \
            --requirement requirements-ml.txt \
            --ignore-vuln PYSEC-2024-277 \
            --strict

      - name: Security audit — transitive deps (non-blocking)
        # Transitive vulnerabilities surface in the run log without
        # blocking PRs — a CVE in an indirect dep may require upstream
        # coordination and shouldn't stall unrelated work. Reviewed
        # quarterly; see docs/runbook.md "pip-audit strategie".
        continue-on-error: true
        run: .venv/bin/pip-audit --disable-pip
