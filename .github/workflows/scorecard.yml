# OpenSSF Scorecard analysis workflow.
#
# Runs the Scorecard CLI weekly against this repository and
# uploads results to the GitHub Security tab. Read-only;
# does not modify the repository.
#
# Reference: https://github.com/ossf/scorecard-action
name: Scorecard supply-chain security

on:
  branch_protection_rule:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  push:
    branches: [ main ]

# Declare default permissions as read-only.
permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      # Required for uploading SARIF results to the GitHub Security tab
      security-events: write
      # Required for the action to read the repository
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@b6a472f63d85b9c78a3ac5e89422239fc15e9b3c # v3.28.1
        with:
          sarif_file: results.sarif
