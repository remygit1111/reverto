# .pre-commit-config.yaml
# Voert automatisch lint en tests uit vóór elke git commit.
# Installeer eenmalig met: pre-commit install

repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff lint
        entry: .venv/bin/ruff check
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest
        entry: .venv/bin/python -m pytest tests/ -q
        language: system
        pass_filenames: false
        always_run: true
