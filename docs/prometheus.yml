# Prometheus scrape + alerting config voor Reverto.
#
# Drop deze als /etc/prometheus/prometheus.yml in je Prometheus
# container (of host path), samen met docs/alerts.yml als
# /etc/prometheus/alerts.yml. docker-compose.yml uit deployment.md
# doet dit automatisch.

global:
  # 30s is het juiste interval voor trade-telemetry: fijn genoeg om
  # drawdown escalaties op minuut-niveau te vangen, grof genoeg om
  # Bitget fetch-intervals niet te pollen in de tick-histogram.
  scrape_interval:     30s
  evaluation_interval: 30s
  # Externe labels verschijnen op elke gealertte time-series zodat
  # multi-env setups (dev/staging/prod) onderscheidbaar blijven.
  external_labels:
    app: reverto

# Alert rules uit docs/alerts.yml — zie comments daar voor
# thresholds + tuning advies.
rule_files:
  - alerts.yml

# Scrape jobs. Reverto exposeert /metrics zonder auth maar moet
# netwerk-gated zijn. In docker-compose.yml zit Prometheus samen
# met de portal in hetzelfde stack-netwerk dus de firewall regel
# "alleen prometheus:9090 mag reverto:8080/metrics hitten" wordt
# door het compose-netwerk afgedwongen.
scrape_configs:
  - job_name: reverto
    metrics_path: /metrics
    static_configs:
      - targets:
          - reverto:8080
        labels:
          service: reverto-portal
