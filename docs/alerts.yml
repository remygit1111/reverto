# Reverto — Prometheus alert rules template
#
# Drop these into your Prometheus `rules.d/` directory (or the
# `rule_files:` block of prometheus.yml) to get first-class alerts on
# the metrics exposed by `web/metrics.py`.
#
# Thresholds below are a conservative starting point — tune to your
# risk profile.  Values assume the default 10s tick interval.

groups:
  - name: reverto_alerts
    interval: 30s
    rules:

      # Drawdown approaching the configured guard threshold.
      - alert: RevertoDrawdownWarning
        expr: reverto_bot_drawdown_pct > 5.0
        for: 1m
        labels:
          severity: warning
          app: reverto
        annotations:
          summary: "Bot {{ $labels.bot_slug }} drawdown {{ $value }}%"
          description: >-
            Drawdown from peak exceeded 5% for >1 minute.
            Investigate open deals before the guard trips.

      # Drawdown severe enough that the kill-switch has likely fired.
      - alert: RevertoDrawdownCritical
        expr: reverto_bot_drawdown_pct > 10.0
        for: 1m
        labels:
          severity: critical
          app: reverto
        annotations:
          summary: "Bot {{ $labels.bot_slug }} CRITICAL drawdown {{ $value }}%"
          description: >-
            Drawdown exceeded 10%.  DrawdownGuard should have paused
            new entries.  Verify `paused_by_drawdown` in state.json
            and decide on operator response.

      # Ticks themselves are failing — exchange API or code regression.
      - alert: RevertoTickErrorBurst
        expr: rate(reverto_bot_tick_errors_total[5m]) > 0.5
        for: 2m
        labels:
          severity: warning
          app: reverto
        annotations:
          summary: "Bot {{ $labels.bot_slug }} error rate {{ $value }}/s ({{ $labels.kind }})"
          description: >-
            Tick-loop errors of type {{ $labels.kind }} > 0.5/s for
            over 2 minutes.  Check the bot's log for repeating traces.

      # Balance dropped below a floor — flags accounts running on fumes.
      - alert: RevertoBalanceLow
        expr: reverto_bot_balance_btc < 0.001
        for: 5m
        labels:
          severity: warning
          app: reverto
        annotations:
          summary: "Bot {{ $labels.bot_slug }} balance near zero ({{ $value }} BTC)"
          description: >-
            Balance < 0.001 BTC for >5 minutes.  Deposit or stop
            the bot to prevent fee-driven underflow.

      # Tick duration p95 above 5s — network / exchange latency issue.
      - alert: RevertoTickSlowness
        expr: >
          histogram_quantile(
            0.95,
            rate(reverto_tick_duration_seconds_bucket[5m])
          ) > 5.0
        for: 5m
        labels:
          severity: warning
          app: reverto
        annotations:
          summary: "Bot {{ $labels.bot_slug }} p95 tick duration {{ $value }}s"
          description: >-
            95th percentile tick duration exceeds 5s (target <1s).
            Check exchange status page and candle-fetch logs.

      # Zero ticks in the last 2 minutes — process likely hung or dead.
      - alert: RevertoTickStall
        expr: rate(reverto_bot_ticks_total[2m]) == 0
        for: 2m
        labels:
          severity: critical
          app: reverto
        annotations:
          summary: "Bot {{ $labels.bot_slug }} produced no ticks in 2m"
          description: >-
            Tick counter flatlined.  Process may be hung (check PID),
            or the state watcher crashed.  Consider emergency-stop.
