<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reverto - Maintenance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: system-ui, -apple-system, "Segoe UI",
      Roboto, sans-serif;
    background: #1e1e1e;
    color: #e0e0e0;
    padding: 1rem;
  }

  .container {
    text-align: center;
    max-width: 500px;
    width: 100%;
  }

  .logo {
    font-size: 2rem;
    font-weight: 700;
    color: #06b6d4;
    letter-spacing: 0.05em;
  }

  .tagline {
    font-size: 0.9rem;
    color: #888;
    margin-top: 0.5rem;
    letter-spacing: 0.02em;
  }

  h1 {
    font-size: 1.5rem;
    margin-top: 3rem;
    font-weight: 500;
    color: #e0e0e0;
  }

  p {
    color: #aaa;
    line-height: 1.6;
    margin-top: 1rem;
  }

  .spinner {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(0, 212, 170, 0.2);
    border-top-color: #06b6d4;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin-right: 10px;
    vertical-align: middle;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .status {
    margin-top: 2rem;
    font-size: 0.85rem;
    color: #666;
  }

  .detail {
    margin-top: 1.5rem;
    font-size: 0.8rem;
    color: #555;
    font-family: ui-monospace, SFMono-Regular, "Consolas",
      monospace;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="logo">REVERTO</div>
    <div class="tagline">Built for Bitcoin</div>

    <h1><span class="spinner"></span>Under maintenance</h1>
    <p>
      Reverto is being updated. Your bots continue running. This
      page reloads automatically when the portal is back online.
    </p>

    <div class="status">
      Typical duration: 5&ndash;15 seconds
    </div>

    <div class="detail" id="detail">
      Waiting for portal&hellip;
    </div>
  </div>

  <script>
    // Audit r1-037: auto-probe /auth/status and reload once the
    // backend responds with anything that isn't a proxy-error
    // (502/503/504 → still waiting). Runs forever; the operator
    // can close the tab if they want to bail. Cached-fetch is
    // disabled so we don't pick up a stale 200 from the browser
    // while the backend is still restarting.
    let attempts = 0;
    const detailEl = document.getElementById('detail');

    function checkPortal() {
      attempts += 1;
      detailEl.textContent = 'Attempt ' + attempts + ', checking…';

      fetch('/auth/status', {
        cache: 'no-store',
        redirect: 'manual',
      })
        .then(function (r) {
          // 502/503/504 = reverse proxy says backend still down.
          // Anything else (200, 401, 3xx) = backend is responding;
          // reload so the SPA picks up the fresh build.
          if (r.status !== 502 && r.status !== 503 && r.status !== 504) {
            detailEl.textContent = 'Portal online, reloading…';
            setTimeout(function () { window.location.reload(); }, 500);
          }
        })
        .catch(function () {
          // Connection refused / DNS error → still waiting.
          // Intentionally silent; the attempt counter is the
          // visible progress signal.
        });
    }

    // First probe after 2 s so the page has a chance to paint,
    // then poll every 2 s.
    setTimeout(function () {
      checkPortal();
      setInterval(checkPortal, 2000);
    }, 2000);
  </script>
</body>
</html>
