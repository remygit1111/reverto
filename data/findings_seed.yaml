  status: open
  title: Multi-bot Bitget rate-limiting has no central coordination
  description: |
    On 2026-04-21 09:00 a 429 surfaced on fetchTicker when multiple bots crossed a 15m candle boundary together. Each bot owns its own ccxt.bitget instance with its own throttle state; Bitget sees the sum of all calls under one IP / API-key without Reverto tracking that sum anywhere. Direction is a centralised rate-limit-manager — natural fit for the Phase-B/C signing-service which is already the choke-point for all exchange calls.
  resolution_ref: null
  notes: ""

- finding_id: B-02
  source_doc: v27-backlog
  severity: LOW
  status: open
  title: Persistent tick-error notification claims "Bot stopped" but engine keeps retrying
  description: |
    The persistent-error Telegram notification labels failures as ⚠️ degraded (transient exhausted) or ⛔ stopped (non-transient), but the engine keeps tick-retrying in both cases. self.running stays True while the Telegram message tells the user to "restart via portal" — confusing not catastrophic. Direction is a lifecycle transition to an `auto_stopped` state on persistent-threshold-hit, with portal UI distinguishing it from a deliberate `make stop`.
  resolution_ref: null
  notes: ""

- finding_id: B-03
  source_doc: v27-backlog
