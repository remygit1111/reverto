  title: Single-host blast radius - Fernet key and ciphertext on one machine
  description: |
    Exchange API credentials are encrypted with Fernet at rest, but the Fernet key and ciphertext both live on the same host. A server compromise grants access to all encrypted exchange credentials.
  resolution_ref: null
  notes: ""

