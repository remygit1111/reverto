  source_doc: saas-readiness-v1-report
  severity: HIGH
  status: resolved
  title: Changelog admin gate uses user.id literal instead of role
  description: |
    _require_admin_user checked user.id != 1 instead of user.role != admin, causing inconsistency with other admin gates and locking out a second seeded admin.
  resolution_ref: fix/r1-002-changelog-admin-role-gate
  notes: ""

