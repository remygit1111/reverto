# ── v27-report (v27-01 … v27-12, 12 entries) ──────────────────────────────────

- finding_id: v27-01
  source_doc: v27-report
  severity: MEDIUM
  status: resolved
  title: API-key fallback returns hard-coded admin stub bypassing user.active
  description: |
    _request_user's API-key branch returned a module-level DEFAULT_USER stub without consulting the DB, bypassing the active-check that the cookie path enforces. Resolved (already in code at audit-time, missed by the v27 baseline) — the API-key path now does user_store.get_user_by_id(1) with active+role validation, matching the cookie path. Cross-references r1-001.
  resolution_ref: fix/r1-001-api-key-respects-active
  notes: "v27-baseline narrative said PRE-EXISTING; grep against HEAD shows the fix already landed (web/app.py:631-645). Recorded as resolved per current code state."

