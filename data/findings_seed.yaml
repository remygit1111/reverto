  source_doc: v26-report
  severity: LOW
  status: resolved
  title: Dead Fernet helpers (save_encrypted/load_encrypted/_system_fernet)
  description: |
    The system-level Fernet helpers were carry-over from the .auth.json admin-credential blob. Phase-3a moved admin auth into users.password_hash (bcrypt), leaving these helpers without a caller. Removed in commit d69fcd2; only the historical-context preamble in core/credentials.py mentions them now.
  resolution_ref: d69fcd2
  notes: ""

- finding_id: v26-07
  source_doc: v26-report
  severity: LOW
  status: open
  title: setup_admin.py treats REVERTO_ADMIN_PW="" as set, then fails length
  description: |
    The provisioning script's empty-string check uses `if env_pw:` which treats "" as truthy-only-when-non-empty correctly, but downstream uses `.get("REVERTO_ADMIN_PW")` without distinguishing unset vs empty. Operator who sets REVERTO_ADMIN_PW= (no value) gets a length-check failure instead of the interactive prompt. Treat empty as unset.
  resolution_ref: null
  notes: ""

- finding_id: v26-08
  source_doc: v26-report
  severity: INFO
  status: resolved
  title: Rate limiter keyed on get_remote_address without XFF parsing
  description: |
    Behind a reverse proxy every request shared one bucket. Resolved by _rate_limit_key_func: prefers per-uid keying when a valid session cookie is present, falls back to the leftmost X-Forwarded-For entry under the r1-004 trust model (proxy overwrites XFF, so leftmost is the trusted client hop).
  resolution_ref: feat/sprint-2-audit-sweep
  notes: ""

