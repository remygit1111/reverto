  severity: LOW
  status: open
  title: State-file .tmp collision between engine and portal reconcile
  description: |
    Both paper/state_io.py and web/app.py use the same state_file.with_suffix(".tmp") path. Concurrent writes can truncate each other before atomic replace. Recovery is NOT self-healing — torn JSON triggers json.loads failure → _default_state(), losing all balance + deal history. Race window is narrow (only fires when portal reconciles a silent-exit while engine's last write hasn't completed) but consequence is high. Updated 2026-05-02 per PT-v4-FS-003 (NEW ANGLE).
