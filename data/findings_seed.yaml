  description: |
    Production cookies are SameSite=strict; the test fixture flips to lax because httpx/TestClient on Python 3.13 + Ubuntu CI drops the cookie on follow-up requests. _COOKIE_SAMESITE override means tests validated the lax posture not the production strict one — meaning the test-suite did not actually exercise the production cookie attributes. Resolved by tests/test_cookie_posture.py (Phase B PR 5) which forces the production posture for the duration of the test and inspects only the Set-Cookie header on the first response, so no follow-up requests rely on cookie-survival across plain-HTTP TestClient transport. 12 tests pin the per-cookie posture for all four production cookies.
  resolution_ref: feat/cookie-posture-regression-test
  notes: "Was ACCEPTED 2026-04-21 with three revisit-triggers; Trigger #1 (Phase B re-opens the auth-stack) fired and produced the fixture pattern that closes the test-fixture-contortion concern."

