  resolution_ref: fix/v26-16-ws-per-user-filter
  notes: "Carry-over of v26-16; resolution_ref shared with the parent finding."

- finding_id: v27-04
  source_doc: v27-report
  severity: MEDIUM
  status: resolved
  title: Third-party CDN script loaded without Subresource Integrity
  description: |
    web/static/index.html loaded lightweight-charts and other unpkg.com scripts without integrity= or crossorigin= attributes, trusting whatever bytes unpkg served. Supply-chain compromise of the npm maintainer or the unpkg CDN would push malicious JS into every Reverto deployment. Resolved by adding integrity="sha384-..." + crossorigin="anonymous" on every <script src="https://unpkg.com/..."> tag.
  resolution_ref: fix/v27-04-cdn-sri
  notes: ""

- finding_id: v27-05
  source_doc: v27-report
  severity: MEDIUM
  status: resolved
  title: CSRF posture relied solely on SameSite=strict; no token or Origin check
  description: |
    No CSRF middleware, synchroniser token, or Origin/Referer check on mutating endpoints — single-lever defence. A SameSite drift (the test fixture already flips to lax) would have flattened the protection. Resolved by adding CSRFMiddleware: double-submit reverto_csrf cookie + X-CSRF-Token header pattern, mint on login, verified server-side on every mutating request.
  resolution_ref: fix/v27-05-csrf-double-submit
  notes: ""

- finding_id: v27-06
  source_doc: v27-report
  severity: LOW
  status: resolved
  title: OSError fallback in API-key bootstrap logs the full ephemeral key
  description: |
    The `except OSError` branch when the ephemeral key file couldn't be written logged the full _API_KEY into portal.log — propagating the credential to docker logs / journald / log shippers. Resolved by replacing the full-key log with a sha256[:8] hint + an instruction to set REVERTO_API_KEY in .env and restart.
  resolution_ref: fix/v27-06-api-key-bootstrap-redact
  notes: ""

- finding_id: v27-07
  source_doc: v27-report
  severity: LOW
  status: open
  title: CSP permits style-src 'unsafe-inline' + broad connect-src
  description: |
    Content-Security-Policy still allows style-src 'unsafe-inline' (needed by SPA inline-style emissions) and connect-src 'self' ws: wss: (allows WebSocket connections to any host). Defence-in-depth gap, not a primary vulnerability. Tightening connect-src to the portal host and phasing out unsafe-inline by moving inline styles to classes is a separate refactor.
  resolution_ref: null
  notes: "style-src 'unsafe-inline' acknowledged as necessary in inline CSP comment; phase-out tracked separately."

- finding_id: v27-08
  source_doc: v27-report
  severity: LOW
  status: resolved
  title: No Strict-Transport-Security header emitted by the portal
  description: |
    SecurityHeadersMiddleware emitted X-Frame-Options + X-Content-Type-Options + Referrer-Policy + CSP but no HSTS. Reverse-proxy deploys typically add it at the proxy layer; portals running directly (dev, future TLS-terminating uvicorn) lacked the first-visit downgrade protection. Resolved (audit r1-075) by adding Strict-Transport-Security: max-age=31536000; includeSubDomains in the middleware.
  resolution_ref: fix/r1-075-hsts
  notes: ""

- finding_id: v27-09
  source_doc: v27-report
  severity: LOW
  status: resolved
  title: LoginBody.username has no character-class restriction
  description: |
    LoginBody allowed any characters in username — whitespace, control chars, punctuation, emoji, ASCII homoglyphs. No real-world impact pre-fix because only `admin` exists and no signup endpoint mints new usernames; defence-in-depth gap closed at the boundary so future signup work inherits the rejection. Pattern ^[a-zA-Z0-9_.-]+$ added to LoginBody.username Field — same character class core.user_store.validate_username has enforced at INSERT time since r1-032/r1-007, so every incumbent row passes.
  resolution_ref: fix/v27-09-v27-12-defense-in-depth
  notes: ""

- finding_id: v27-10
  source_doc: v27-report
  severity: INFO
  status: resolved
  title: Cookie payload carries `u` field that no longer drives auth decisions
  description: |
    Pre-fix the session cookie carried "u": user.username alongside uid/iat/ep, but every auth path resolved the User from uid via user_store.get_user_by_id. The string-username was dead payload — and stale once a future rename API lands. Resolved (audit r1-006) by dropping `u` from the cookie payload; readers only require uid.
  resolution_ref: fix/r1-006-cookie-no-username
  notes: ""

- finding_id: v27-11
  source_doc: v27-report
  severity: INFO
  status: resolved
  title: audit.log was a single cross-user file
  description: |
    The audit logger wrote to logs/audit.log with no user separation; multi-tenant rollout would expose every tenant's event timeline through one shared file. Resolved (audit r1-031) by adding the JSONL dual-write that lands a per-user copy at logs/<user_id>/audit.jsonl whenever the caller passes user_id, while keeping the global audit.log for cross-tenant compliance queries.
  resolution_ref: fix/r1-031-audit-jsonl-dual-write
  notes: ""

- finding_id: v27-12
  source_doc: v27-report
  severity: INFO
  status: resolved
  title: TickerError.message truncation may leak URL fragments to Telegram
  description: |
    classify_exception truncated str(exc)[:200] into TickerError.message without scrubbing credential-bearing fragments first. A 200-char cap leaves room for a full apiKey + signature pair to survive into Telegram's "Reason" line. Resolved by paper.errors._redact_secrets running before the truncation cap. Targets: query-string credential params (apiKey, signature, secret, passphrase, sign), Bearer tokens, JWT-shape. Param-name preserved on key=value shapes so error context stays useful for debugging.
  resolution_ref: fix/v27-09-v27-12-defense-in-depth
  notes: ""

