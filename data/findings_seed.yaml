- finding_id: v26-01
  source_doc: v26-report
  severity: MEDIUM
  status: resolved
  title: _require_session does not check user.active
  description: |
    The _require_session FastAPI dependency only validated cookie signature + TTL + session_epoch — not the users.active flag. A deactivated user with a still-valid epoch could call /api/auth/change-password while every other route (via _request_user) refused them. Phase-A wrap-up deleted _require_session entirely and migrated change-password onto _request_user, eliminating the parity surface.
  resolution_ref: feat/phase-a-wrapup
  notes: ""

- finding_id: v26-02
  source_doc: v26-report
  severity: MEDIUM
  status: resolved
  title: /api/emergency-stop has no role gate
  description: |
    The endpoint guarded only on _request_actor (a string identifier for logging) without any role check, so any authenticated user could SIGTERM every bot across every tenant. Now resolves the caller via Depends(_request_user) and refuses non-admin with 403; non-admin attempts also emit a structured audit event with result="denied".
  resolution_ref: fix/v26-02-emergency-stop-admin-gate
  notes: ""

- finding_id: v26-03
  source_doc: v26-report
  severity: MEDIUM
  status: open
  title: Password-length policy inconsistent (setup-admin 10 vs change-password 8)
  description: |
    scripts/setup_admin.py enforces a 10-character minimum; web/routes/auth.py change-password enforces 8. Operator can set a 10-char password via setup_admin and then change it down to 8 via the portal. Audit drift risk; tighten both to PASSWORD_MIN_LENGTH from core.user_store.
  resolution_ref: null
  notes: ""

- finding_id: v26-04
  source_doc: v26-report
  severity: LOW
  status: resolved
  title: /auth/logout has no rate-limit decorator
  description: |
    Pre-fix the logout endpoint had no @limiter.limit decorator while every other auth endpoint did. A misbehaving client could hammer logout-then-relogin against a single user's session. Resolved by adding @limiter.limit("10/minute", key_func=_logout_rate_limit_key) — keys on uid when the cookie validates so one user can't swamp another's bucket.
  resolution_ref: fix/v26-04-logout-rate-limit
  notes: ""

