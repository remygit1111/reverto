# Audit + pentest findings seed for the admin findings tracker.
#
# Sourced from eight markdown documents under docs/audits/ and
# docs/pentests/. Each YAML entry mirrors the AuditFinding row
# shape in core.audit_findings_store.
#
# Status mapping rules (applied during extraction):
#   * "RESOLVED in <commit/branch>"  → status: resolved + ref filled
#   * "ACCEPTED"                      → status: accepted
#   * "DEFERRED" / "out of scope"     → status: deferred
#   * "MONITORING"                    → status: in_progress
#   * "PARTIALLY RESOLVED"            → status: in_progress
#   * No marker but in fixed-list     → status: resolved
#   * Unclear                         → status: open + notes flag
#
# This seed is the *initial* state. Operator edits flow through the
# admin UI and are not echoed back here — re-running the seed never
# overwrites status / notes / resolution_ref on existing rows.
#
# Counts per source: r1=76, r1.1=6, pd=54, r2=11, r3=15, rha=15,
# pt-v1=39, pt-v2=24. Total: 240.

findings:

# ── saas-readiness-v1-report (r1-001 … r1-076) ───────────────────────────────

- finding_id: r1-001
  source_doc: saas-readiness-v1-report
  severity: HIGH
  status: resolved
  title: API-key fallback returns hardcoded admin stub, bypassing active check
  description: |
    The _request_user function returned a hardcoded DEFAULT_USER with role=admin when an X-API-Key matched, bypassing the active-check and granting cross-tenant admin access to any holder of the shared key.
  resolution_ref: fix/r1-001-api-key-respects-active
  notes: ""

- finding_id: r1-002
  source_doc: saas-readiness-v1-report
  severity: HIGH
  status: resolved
  title: Changelog admin gate uses user.id literal instead of role
  description: |
    _require_admin_user checked user.id != 1 instead of user.role != admin, causing inconsistency with other admin gates and locking out a second seeded admin.
  resolution_ref: fix/r1-002-changelog-admin-role-gate
  notes: ""

- finding_id: r1-003
  source_doc: saas-readiness-v1-report
  severity: MEDIUM
  status: open
  title: Single shared REVERTO_API_KEY with no rotation or per-user concept
  description: |
    Every script and admin automation shares one process-wide REVERTO_API_KEY env var with no rotation flow that does not require portal restart. Multi-tenant SaaS needs per-tenant keys.
  resolution_ref: null
  notes: ""

