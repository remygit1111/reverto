- finding_id: r1-001
  source_doc: saas-readiness-v1-report
  severity: HIGH
  status: resolved
  title: API-key fallback returns hardcoded admin stub, bypassing active check
  description: |
    The _request_user function returned a hardcoded DEFAULT_USER with role=admin when an X-API-Key matched, bypassing the active-check and granting cross-tenant admin access to any holder of the shared key.
  resolution_ref: fix/r1-001-api-key-respects-active
  notes: ""

