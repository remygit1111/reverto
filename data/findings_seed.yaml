- finding_id: PT-v4-AU-001
  source_doc: pt-v4-au-pentest
  severity: MEDIUM
  status: open
  title: scripts/totp_admin_reset.py does not bump session_epoch
  description: |
    The pt-130 fix established the invariant that any TOTP enable/disable action must bump session_epoch to invalidate existing sessions. The in-app endpoints implement this correctly. However, the admin-recovery script scripts/totp_admin_reset.py was missed during pt-150 follow-up and resets a user's TOTP secret without bumping session_epoch. In any post-compromise recovery scenario where an admin invokes this script, the original attacker's session remains valid until the cookie expires naturally.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-AU-002
  source_doc: pt-v4-au-pentest
  severity: LOW
  status: open
  title: /auth/totp/verify does not check user.totp_enabled before commit
  description: |
    The TOTP verify endpoint commits a verified secret without checking whether the user already has TOTP enabled. Combined with PT-v4-AU-001, this allows an attacker who held a valid session before an admin-TOTP-reset to silently re-install a TOTP secret post-recovery. Non-exploitable in isolation; concerning in combination with the missed session-epoch bump.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-AU-003
  source_doc: pt-v4-au-pentest
  severity: LOW
  status: open
  title: /auth/totp/disable failures don't increment failed_login_count
  description: |
    The per-account rate-limit (failed_login_count) is the load-bearing secondary control on auth-related endpoints, fired before bcrypt cost is incurred. /auth/totp/disable does not increment this counter on failure, leaving the endpoint without per-account cooldown. Defense-in-depth gap rather than direct vulnerability — the endpoint requires both password and current TOTP, but a slow-burn attacker can exhaust attempts against a stolen password without triggering the cooldown that would otherwise lock the account.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-AU-004
  source_doc: pt-v4-au-pentest
  severity: LOW
  status: resolved
  title: /auth/logout does not emit an audit event
  description: |
    Login emits structured audit events (success and failure paths). Logout does not. For incident-response timeline reconstruction, logout-without-explicit-event makes it harder to distinguish "user logged out cleanly" from "session naturally expired" from "attacker bumped session_epoch via password change to invalidate the original session". Audit-trail gap, not an exploitation vector. RESOLVED 2026-05-04: _audit('logout', ...) call added in web/routes/auth.py auth_logout handler.
  resolution_ref: chore/pt-v4-audit-events-observability
  notes: ""

- finding_id: PT-v4-AU-005
  source_doc: pt-v4-au-pentest
  severity: INFO
  status: open
  title: AuthMiddleware /static/ prefix bypass not path-normalized
  description: |
    The AuthMiddleware allows requests under /static/ to bypass auth via prefix match (path.startswith("/static/")). The check does not normalize encoded paths (%2f, %2e%2e, etc) before matching. While Starlette's routing layer rejects directory-traversal at the router level, the middleware's prefix check happens before that. Theoretical concern more than practical — no path-traversal attack succeeds in practice — but the principle of normalize-before-compare is worth applying.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-AU-006
  source_doc: pt-v4-au-pentest
  severity: INFO
  status: open
  title: /api/auth/change-password allows no-op rotation (new == current)
  description: |
    The change-password endpoint validates that the new password meets policy and that the current password is correct, but does not check that new != current. A user can submit their existing password as the "new" password, triggering a session_epoch bump (logging out other sessions) without actually rotating credentials. Edge-case usability annoyance rather than security issue, but worth noting.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-AU-007
  source_doc: pt-v4-au-pentest
  severity: INFO
  status: open
  title: bcrypt 72-byte truncation not enforced at the boundary
  description: |
    bcrypt silently truncates passwords to 72 bytes. The change-password and login endpoints do not pre-validate password length before passing to bcrypt, meaning users with passwords longer than 72 bytes have their input silently truncated. Two passwords differing only after byte 72 hash to the same value. The Pydantic max-length on the password field is currently set to a value that allows >72-byte input. Edge-case affecting users with very long passphrases. Industry practice is to either (a) reject >72 bytes at validation, (b) pre-hash with SHA-256 to bring any input below 72 bytes, or (c) document the limit clearly.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-AU-008
  source_doc: pt-v4-au-pentest
  severity: INFO
  status: open
  title: HIBP fail-mode behavior on is_password_pwned not verified
  description: |
    core/password_breach.py implements is_password_pwned to check passwords against the Have I Been Pwned API. The pentest did not deeply review this module (out of immediate auth-stack scope). Recommendation for operator follow-up: verify behavior when the HIBP API is unreachable. Fail-open (allow registration on API error) is the typical implementation but trades availability for security; fail-closed (reject registration when uncertain) is stricter. Either is acceptable as a deliberate choice, neither is acceptable as an unintended default.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-AU-009
  source_doc: pt-v4-au-pentest
  severity: INFO
  status: open
  title: REVERTO_SECRET_KEY ephemeral fallback does not fail-closed
  description: |
    web/app.py generates a random REVERTO_SECRET_KEY at startup if the env-var is not set, with a warning logged. This makes development convenient but means a misconfigured production deploy generates a fresh secret every restart, invalidating all existing sessions silently. A fail-closed alternative would refuse to start unless the secret is explicitly set, with a clear error message directing the operator to set REVERTO_SECRET_KEY. Operational concern rather than direct vulnerability — but a forgotten env-var causes mysterious "everyone is logged out" symptoms during incidents.
  resolution_ref: null
  notes: ""

# ── pt-v4-az-pentest (PT-v4-AZ-001 … PT-v4-AZ-006) ───────────────────────────
#
# Internal pentest batch covering authorization & access control.
# AI-driven adversarial code review by Claude Code on 2026-05-02.
# 6 findings (0 CRITICAL, 0 HIGH, 0 MEDIUM, 2 LOW, 4 INFO).
# See docs/pentests/PT-v4-AZ-findings.md for the full report.
#
# Notable verified controls during this pentest:
# - WebSocket per-socket _user_map discipline correct (Audit
#   v26-16's filtering claim verified in code)
# - _request_user re-fetches role from DB on every request, so
#   role demotion is immediate (better than session_epoch bump)
# - All IDOR vectors B2.1-B2.6 sourced user_id from session,
#   never request input
# - Confirmed B-03 resolved (duplicate of r1-049; status flipped
#   in this same PR)

- finding_id: PT-v4-AZ-001
  source_doc: pt-v4-az-pentest
  severity: LOW
  status: open
  title: _audit() argument-order swap across 12 callsites in changelog/roadmap/marketing
  description: |
    Audit-log integrity issue across 12 _audit() callsites in web/routes/changelog.py, web/routes/roadmap.py, and web/routes/marketing.py. user.username is in the slug-position and the entry/phase id is in the actor-position, so the resulting JSONL has slug=<username> and user=id=<entryid>. The same swap was explicitly fixed in admin_findings.py per its own comment, but the sibling files still have it. Not an authz bypass — slug field of the JSONL contains usernames, user field contains id=N. Mechanical fix.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-AZ-002
  source_doc: pt-v4-az-pentest
  severity: INFO
  status: open
  title: WebSocket connection-time auth not explicitly verified separately from delivery-time filtering
  description: |
    Audit v26-16 fixed delivery-filtering by owner_user_id and target_user_id, and the per-socket _user_map discipline holds. However, the connection-establishment path was not separately scrutinized for an auth check before the user_map entry is created. Risk is low because the WebSocket endpoint inherits from FastAPI dependency injection that requires session, but a future refactor that bypasses dependency injection (e.g. raw ASGI handler) would silently lose this gate. Worth a regression test that pins "anonymous WS connection returns 401 before any payload is sent."
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-AZ-003
  source_doc: pt-v4-az-pentest
  severity: INFO
  status: open
  title: Two admin-gate patterns coexist (Depends-style and manual-helper-style)
  description: |
    The codebase has two equivalent but stylistically different admin gates: _require_admin_user (used as Depends() in changelog.py, roadmap.py, marketing.py, admin_findings.py) and _require_admin (manual helper called from each handler in admin_bots.py). Functionally equivalent at HEAD — both check user.role == 'admin' — but the manual style is forward-bug-surface: a future route author in admin_bots.py could forget the call, while the Depends() pattern is impossible to forget once added to the route signature. Easy consolidation: convert admin_bots.py to use _require_admin_user with Depends().
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-AZ-004
  source_doc: pt-v4-az-pentest
  severity: INFO
  status: open
  title: Dual admin-gate naming (_require_admin vs _require_admin_user)
  description: |
    Sibling concern to PT-v4-AZ-003. Even if both patterns stay, the function names should match: either both _require_admin or both _require_admin_user. Current divergence makes grep-based audit ("find all admin-gated endpoints") harder. Cosmetic-but-meaningful for auditability.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-AZ-005
  source_doc: pt-v4-az-pentest
  severity: LOW
  status: open
  title: AnnotationBody accepts unbounded bot_slug/type/timeframe/label/color strings
  description: |
    web/routes/deals.py:465 AnnotationBody Pydantic model has bot_slug/type/timeframe/label/color fields without max-length constraints. No cross-tenant exposure (rows scope by session user.id), but it lets an authenticated user store arbitrary key/value blobs on chart_annotations. Forward-coupling risk if any downstream code path ever uses bot_slug in a filesystem operation — current code paths are read-only against the database, so no exploitation path today. Defense-in-depth fix: add max_length to each field (slug regex same as bots, label/color reasonable bounds).
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-AZ-006
  source_doc: pt-v4-az-pentest
  severity: INFO
  status: open
  title: User-scoped data paths over-engineered with belt-and-braces filtering (positive observation)
  description: |
    Pentest probed all 6 IDOR vectors (B2.1-B2.6) and found that every user-scoped query consistently filters by session-derived user_id. SQL queries on deals, chart_annotations, backtest_runs, dashboards all show the WHERE user_id = ? pattern. Bot operations source user_id from session.user.id, never from request body. This is a positive finding documenting the strong baseline. No action required — recorded for future auditors so they don't waste time re-probing the same vectors.
  resolution_ref: null
  notes: ""

# ── pt-v4-fs-pentest (PT-v4-FS-001 … PT-v4-FS-009) ────────────────────────────
#
# Internal pentest batch covering filesystem & file operations.
# AI-driven adversarial code review by Claude Code on 2026-05-02.
# 9 findings (0 CRITICAL, 0 HIGH, 1 MEDIUM, 5 LOW, 3 INFO).
# See docs/pentests/PT-v4-FS-findings.md for the full report.
#
# Notable verified controls during this pentest:
# - core/paths.py user-id discipline structurally prevents
#   path-traversal (str(int) cannot contain /, .., or separators)
# - _BOT_SLUG_RE coverage: every fs-touching endpoint either
#   regex-validates the slug or uses registry.get(user_id, slug)
#   which only resolves slugify()-cleaned keys
# - credentials/ and credentials/<uid>/ both 0700; key files 0600
#   verified via ensure_secret_file_mode after every write
# - StateIO.cleanup_orphan_tmps name-prefix discipline correct
# - cleanup_orphaned_tmp_files handles symlink edge (unlink doesn't
#   follow) and directory-named-.tmp edge correctly
# - bot.read_state size-cap closes TOCTOU between stat() and read
# - _rotation_lock per-user fcntl on keys/<uid>.key.lock
#
# Tracker hygiene as part of this PR:
# - r2-007 flipped to resolved (POSIX atomic-rename docstring is in
#   paper/state_io.py:244-275 at HEAD)
# - rha-001 description rewritten — "self-healing" claim was
#   misleading; actual recovery is "engine resets to defaults,
#   losing balance + deal history"
# - pd-044 stays resolved; FS-004 documents the keys/ scope gap
# - pd-036 stays accepted; FS-005 documents multi-exchange gap

- finding_id: PT-v4-FS-001
  source_doc: pt-v4-fs-pentest
  severity: MEDIUM
  status: open
  title: DELETE /api/bots/{slug} does not clean up logs/state/sentinel files; new bot with same slug inherits old state
  description: |
    bots.py:521-542 DELETE endpoint only removes config/bots/<uid>/<slug>.yaml. Files NOT removed: logs/<uid>/<slug>.{log,state.json,state.lock,manual_trigger,deal_edit_*,deal_close_*,deal_cancel_*}, ml/<uid>/results_<slug>.json, plus DB rows in deals/orders/chart_annotations/backtest_runs. Functional bug: a user who deletes then recreates a bot with the same slug gets the engine to rehydrate from the OLD state.json — inheriting old balance, open deals, drawdown peak, DCA overrides, PnL history. Confusing for paper bots; potentially dangerous for live bots where new config might mismatch inherited open-deal state. Suggested fix: a single purge_bot(user_id, slug) helper in core/paths.py that removes all bot-scoped files + DB rows, called from the DELETE handler.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-FS-002
  source_doc: pt-v4-fs-pentest
  severity: LOW
  status: open
  title: _ensure_dir silently swallows chmod failures and follows symlinks
  description: |
    core/paths.py:40-49 _ensure_dir uses Path.mkdir(parents=True, exist_ok=True, mode=mode), which (a) follows symlinks during the existence check (mkdir on an existing-symlink is a no-op even if target is wrong perms) and (b) the subsequent path.chmod(mode) is wrapped in `except OSError: pass` which swallows failures silently. Matches today's recurring permission pain (Caddy log root-owned, ProtectSystem strict, deploy-marketing). If keys/ or credentials/<uid>/ already exists with wrong perms from a previous deploy and chmod fails, secrets land in an over-permissive dir without any warning. Suggested fix: log chmod failure at WARNING level and emit a structured audit-event so bootstrap-permission-drift is visible.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-FS-003
  source_doc: pt-v4-fs-pentest
  severity: LOW
  status: open
  title: state-file .tmp collision recovery is "lose all state", not "self-healing" (NEW ANGLE on rha-001)
  description: |
    NEW ANGLE on existing finding rha-001. The "self-healing on next read_state" claim is misleading. Actual recovery: torn JSON triggers json.loads failure → _default_state() — engine resets to defaults, losing all balance + deal history. Race window is narrow (only fires when portal reconciles a silent-exit while engine's last write hasn't completed), but consequence is high. The rha-001 description has been updated as part of this PR. The structural fix (separate .tmp paths for engine and portal) is still needed; tracking under rha-001.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-FS-004
  source_doc: pt-v4-fs-pentest
  severity: LOW
  status: open
  title: keys/ directory not swept by orphan .tmp cleanup (Extension of pd-044)
  description: |
    Extension of resolved finding pd-044 (orphaned .tmp cleanup at startup). The cleanup_orphaned_tmp_files helper at core/cleanup.py:25-73 sweeps logs/ and credentials/ but not keys/. If a Fernet rotation crashes after creating keys/<uid>.key.tmp but before os.replace, the orphaned .tmp file persists indefinitely. Not a security issue (the .tmp is mode 0600 same as the live key), but disk hygiene gap. Suggested fix: add keys/ to the directories sweep list.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-FS-005
  source_doc: pt-v4-fs-pentest
  severity: LOW
  status: open
  title: Multi-exchange Fernet rotation has partial-crash recoverability gap (NEW ANGLE on pd-036)
  description: |
    Extension of accepted finding pd-036 (key rotation atomic under fcntl lock). The "key-first then each .enc" sequence at credentials.py:532-598 is atomic for SINGLE-exchange users but has a partial-crash window for MULTI-exchange users. After key replaces (step 5), the rotation iterates over each exchange's .enc file. A crash mid-iteration leaves user with: NEW key + some .enc files re-encrypted (decryptable) + some .enc files still encrypted with OLD key (non-decryptable, perceived as corrupt). Recovery requires manual operator intervention. Suggested mitigation: write all new .enc files as .enc.tmp first, fsync, then atomic-rename ALL of them after the key replace — bringing partial-crash window down to "all-new or all-old, never mixed". Or simpler: log the partial-rotation state to audit-trail so operator can detect and roll forward/back.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-FS-006
  source_doc: pt-v4-fs-pentest
  severity: LOW
  status: open
  title: No fsync before os.replace in atomic write paths (durability gap)
  description: |
    Across credentials.py, marketing_export.py, paper/state_io.py, and web/app.py, the .tmp + os.replace pattern writes data and renames without fsync. On power-loss between write and rename, the rename may be durable while the data isn't yet on disk — readers after power-on would see an empty or zero-length file. Also missing: parent-directory fsync after rename (rename durability requires it on Linux). Real-world impact rare on a stable VPS; matters for flaky-storage scenarios or unexpected power-events. Suggested fix: add fsync(fd) before close + os.fsync of parent dir after rename in a centralized atomic_write helper.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-FS-007
  source_doc: pt-v4-fs-pentest
  severity: INFO
  status: open
  title: No max-bots-per-user limit (potential disk-fill DoS for malicious users)
  description: |
    There is no hard cap on how many bots a single authenticated user can create. Each bot creates ~7 files (config, log, state, lock, manual_trigger, pid, ml results) plus DB rows. With rate-limit at 20 bot-creates/min, a malicious user could create ~28k bots/day. Per-bot disk footprint at idle is small (~few KB), but multiplied by 28k = ~140MB/day. Not exploitable without authentication and not a current threat (single-tenant), but worth limiting before SaaS launch. Suggested limit: configurable max_bots_per_user (default e.g. 50 for free tier, configurable per role). Also: log_size capping per bot (currently bot logs grow unbounded).
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-FS-008
  source_doc: pt-v4-fs-pentest
  severity: INFO
  status: open
  title: Bot logs grow unbounded (no log-size cap at engine subprocess)
  description: |
    Bot subprocess writes to logs/<uid>/<slug>.log without any size cap. Long-running bots accumulate log indefinitely. Operator-facing concern (disk-fill on the VPS), not a security issue. For comparison, Caddy logs are capped at 100MiB with rotation. Suggested fix: add log-rotation to engine subprocess, or wrap stdout/stderr through a size-capped redirector at start_bot time.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-FS-009
  source_doc: pt-v4-fs-pentest
  severity: INFO
  status: open
  title: Filesystem surface structurally well-defended (positive observation)
  description: |
    Pentest probed all 10 attack-vector categories (C1-C10). Path-traversal and permission-boundary surfaces are structurally well-defended: every paths.py helper takes int user_id (str(int) cannot contain /), every slug-consuming endpoint either regex-validates or uses registry.get with slugify-cleaned keys, credentials and keys directories have correct 0700/0600 modes verified via ensure_secret_file_mode after every write. The cleanup helpers handle symlink edges correctly. Findings cluster around (a) cleanup-hygiene gaps that became functional bugs (FS-001, FS-004, FS-005) and (b) durability gaps (FS-006) that matter on flaky storage but rarely on stable VPS. No path traversal, symlink-following with cross-tenant impact, or permission bypass with practical exploit was found.
  resolution_ref: null
  notes: ""

# ── pt-v4-nw-pentest (PT-v4-NW-001 … PT-v4-NW-011) ────────────────────────────
#
# Internal pentest batch covering network surface, headers, CORS,
# CSRF, rate limiting, cookies, WebSocket auth, redirects, Caddy config.
# AI-driven adversarial code review by Claude Code on 2026-05-02.
# 11 findings (0 CRITICAL, 0 HIGH, 2 MEDIUM, 3 LOW, 6 INFO).
# See docs/pentests/PT-v4-NW-findings.md for the full report.
#
# Notable verified controls during this pentest:
# - Today's reverto.bot CSP fix (Caddyfile:16) is exemplary —
#   default-src 'self', no 'unsafe-inline' anywhere, OWASP extras
#   (base-uri, form-action), frame-ancestors 'none'
# - XFF overwrite at Caddyfile:50 (header_up X-Forwarded-For
#   {client_ip}) — resolves pt-025 (was OPEN HIGH, flipped this PR)
# - No CORSMiddleware (eliminates entire class of misconfig)
# - Login dual rate-limit (per-IP slowapi + per-account DB sliding
#   window) handles brute-force and bcrypt-DoS
# - Double-submit CSRF cookie pattern correctly implemented
# - WebSocket auth via _ws_extract_user_id with explicit close
#   codes (4401/4403)
#
# Tracker hygiene as part of this PR:
# - pt-025 flipped open → resolved (Caddyfile fix verified at HEAD)

- finding_id: PT-v4-NW-001
  source_doc: pt-v4-nw-pentest
  severity: MEDIUM
  status: resolved
  title: app.reverto.bot CSP missing base-uri and form-action directives
  description: |
    web/app.py:2189-2226 sets CSP for app.reverto.bot but lacks 'base-uri 'self'' and 'form-action 'self''. Today's reverto.bot Caddy CSP HAS both. The asymmetry is the wrong direction — the more sensitive site (authenticated portal, admin endpoints, exchange credentials) has WEAKER CSP than the marketing site. With any HTML-injection primitive, missing base-uri enables relative-URL hijack via injected <base> tag, and missing form-action enables credential exfiltration via attacker-controlled form submission. Suggested fix: add both directives to the FastAPI CSP middleware to match reverto.bot's strictness. RESOLVED 2026-05-04: base-uri 'self' and form-action 'self' added to FastAPI CSP middleware in web/app.py.
  resolution_ref: chore/pt-v4-nw-app-headers-parity
  notes: ""

- finding_id: PT-v4-NW-002
  source_doc: pt-v4-nw-pentest
  severity: LOW
  status: resolved
  title: app.reverto.bot Caddy block has no header directive (5xx maintenance.html lacks security headers)
  description: |
    ops/caddy/Caddyfile app.reverto.bot vhost has reverse_proxy + handle_errors + log but no header { ... } directive. Consequence: when Caddy serves maintenance.html during a 5xx fallback, no security headers are attached (CSP, HSTS, X-Frame-Options, etc.). The FastAPI middleware doesn't apply because Caddy is serving directly. Window is rare (only during backend outages) but exposes maintenance page to clickjacking, MITM downgrade, etc. Suggested fix: add header { } block to app.reverto.bot vhost matching the reverto.bot block. RESOLVED 2026-05-04: header { } block added to app.reverto.bot Caddy vhost in ops/caddy/Caddyfile, mirroring the reverto.bot block (HSTS, X-Frame-Options, X-Content-Type-Options, Referrer-Policy, Permissions-Policy, -Server). CSP intentionally omitted from Caddy — FastAPI middleware is canonical for that header.
  resolution_ref: chore/pt-v4-nw-app-headers-parity
  notes: ""

- finding_id: PT-v4-NW-003
  source_doc: pt-v4-nw-pentest
  severity: LOW
  status: resolved
  title: app.reverto.bot leaks Server header (no -Server in Caddy block)
  description: |
    ops/caddy/Caddyfile reverto.bot has -Server in its header block; app.reverto.bot doesn't (and has no header block at all — see NW-002). The 'Server: Caddy' header is exposed on every app.reverto.bot response. Information disclosure of low impact, but inconsistent with the marketing-site fix today. Suggested fix: add -Server to the app.reverto.bot header block (NW-002 fix would naturally include this). RESOLVED 2026-05-04: -Server directive added to app.reverto.bot header block (part of NW-002 fix).
  resolution_ref: chore/pt-v4-nw-app-headers-parity
  notes: ""

- finding_id: PT-v4-NW-004
  source_doc: pt-v4-nw-pentest
  severity: MEDIUM
  status: open
  title: No global request-body size limit (memory DoS via large POST)
  description: |
    _read_body_with_cap is only applied on bots-config endpoints (POST /api/bots, PUT config). Other endpoints — /auth/login, /api/admin/*, /api/dashboard/layout, /api/db/annotations, etc. — read the full body before Pydantic field-length checks fire. A 1GB POST to /auth/login allocates 1GB before Pydantic's max_length=512 rejects it. Caddy lacks request_body { max_size }. Memory-DoS amplifiable across IPs. Suggested fix: (a) Caddy global request_body { max_size 1MB } as defense-in-depth, plus (b) extend _read_body_with_cap to all body-accepting endpoints, or (c) FastAPI middleware that rejects oversized bodies before route handlers.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-NW-005
  source_doc: pt-v4-nw-pentest
  severity: LOW
  status: open
  title: WebSocket origin check not enforced
  description: |
    ws_logs endpoint at web/app.py:3111+ relies on cookie-based session auth via _ws_extract_user_id but does NOT validate the Origin header. FastAPI/Starlette doesn't auto-check WS Origin. Cross-origin WebSocket attacks possible: a malicious site can establish a WS connection from the victim's browser (cookie included via SameSite=Strict-relaxed-on-WS-upgrade behavior in some browsers). Mitigated by SameSite=Strict on session cookie but defense-in-depth deserves explicit Origin validation. Suggested fix: in _ws_extract_user_id (or a separate _ws_validate_origin), check websocket.headers.get("origin") matches https://app.reverto.bot.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-NW-006
  source_doc: pt-v4-nw-pentest
  severity: INFO
  status: accepted
  title: HSTS sent by both Caddy and FastAPI (duplicate header risk)
  description: |
    reverto.bot Caddy sets Strict-Transport-Security; app.reverto.bot FastAPI sets it too. If a future Caddy config also sets it on app.reverto.bot (e.g. via NW-002 fix), the header would appear twice. Most browsers handle duplicate HSTS gracefully (use first or strictest), but RFC-compliant proxies may reject. Suggested fix: pick a single source of truth — either Caddy or FastAPI for app.reverto.bot, not both.
  resolution_ref: null
  notes: "Operator-decision 2026-05-04: dual HSTS emission (Caddy + FastAPI) accepted as defense-in-depth. Browsers handle duplicate HSTS headers correctly per RFC 6797 (use-strictest semantics). Layered defense weighs heavier than single-source-of-truth here — if Caddy is bypassed or misconfigured, FastAPI still emits HSTS for the authenticated portal."

- finding_id: PT-v4-NW-007
  source_doc: pt-v4-nw-pentest
  severity: INFO
  status: resolved
  title: Permissions-Policy denial-list inconsistent between Caddy and FastAPI
  description: |
    reverto.bot Caddy and app.reverto.bot FastAPI both set Permissions-Policy. Compare lists: are the denied features identical? If not, future divergence is bug surface. Suggested fix: define the denial-list once (e.g. constant in core/security_headers.py) and reference from both vhost contexts. Also: HEAD-of-time inventory shows the lists ARE currently identical, so this is forward-bug-prevention, not a current bug. RESOLVED 2026-05-04: regression test test_permissions_policy_identical_across_caddy_and_fastapi in tests/test_security_headers.py asserts identical lists across reverto.bot Caddy, app.reverto.bot Caddy, and FastAPI middleware.
  resolution_ref: chore/pt-v4-nw-app-headers-parity
  notes: ""

- finding_id: PT-v4-NW-008
  source_doc: pt-v4-nw-pentest
  severity: INFO
  status: open
  title: No TrustedHostMiddleware (defense-in-depth gap)
  description: |
    FastAPI app has no TrustedHostMiddleware configured. Caddy routes by Host (only forwards reverto.bot/app.reverto.bot to the backend), so direct exploitation requires bypassing Caddy. However, defense-in-depth: if Caddy is misconfigured or replaced, FastAPI accepts any Host header. Could enable Host-header poisoning attacks (e.g. password-reset link generation if implemented). Suggested fix: add TrustedHostMiddleware allowing ['app.reverto.bot', 'localhost'] in production.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-NW-009
  source_doc: pt-v4-nw-pentest
  severity: INFO
  status: open
  title: app.reverto.bot CSP allows https://unpkg.com without subresource integrity
  description: |
    web/app.py:2225 CSP includes script-src https://unpkg.com (Lightweight Charts library). No subresource-integrity (SRI) hashes on the <script> tag in templates. If unpkg.com is compromised or the library is updated to malicious content, every Reverto user runs the bad code. Risk is low (unpkg.com is run by NPM, and the library is pinned-version) but is the classic "trust forever" CSP gap. Suggested fix: pin the library version in CSP (script-src 'sha384-XYZ='...) OR self-host the library (eliminates the dependency entirely). The latter is cleaner.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-NW-010
  source_doc: pt-v4-nw-pentest
  severity: INFO
  status: resolved
  title: No TLS 1.0/1.1 disable verification in Caddy config
  description: |
    Caddyfile uses Caddy's automatic TLS without explicit tls block. Caddy v2 defaults to TLS 1.2+ (which is correct), but the absence of explicit tls { protocols tls1.2 tls1.3 } in the config means a future Caddy upgrade or operator change could silently weaken this. Suggested fix: explicit tls { protocols tls1.2 tls1.3 } in both vhost blocks for forward-bug-prevention. RESOLVED 2026-05-04: explicit tls { protocols tls1.2 tls1.3 } block added to both reverto.bot and app.reverto.bot vhosts in ops/caddy/Caddyfile.
  resolution_ref: chore/pt-v4-nw-app-headers-parity
  notes: ""

- finding_id: PT-v4-NW-011
  source_doc: pt-v4-nw-pentest
  severity: INFO
  status: open
  title: HTTP-layer surface well-defended (positive observation)
  description: |
    Pentest probed all 11 attack-vector categories (N1-N11). Findings cluster on (a) Caddy app-side configuration parity gap (NW-001 to NW-003) and (b) body-size governance (NW-004) — both fixable in one Caddy edit + one middleware edit. No CRITICAL, no HIGH. CSRF, cookie security, rate limiting, WebSocket auth, redirect handling all hold up under scrutiny. Today's reverto.bot CSP fix scores cleanly against OWASP CSP cheat sheet. The XFF overwrite resolves the previously-OPEN-HIGH pt-025 finding. The dual rate-limit on login (per-IP + per-account) is well-engineered.
  resolution_ref: null
  notes: ""

# ── pt-v4-mk-pentest (PT-v4-MK-001 … PT-v4-MK-008) ────────────────────────────
#
# Internal pentest batch covering marketing/app architectural split:
# admin → public boundary, data-export pipeline, client-side rendering.
# AI-driven adversarial code review by Claude Code on 2026-05-02.
# 8 findings (0 CRITICAL, 0 HIGH, 0 MEDIUM, 3 LOW, 5 INFO).
# See docs/pentests/PT-v4-MK-findings.md for the full report.
#
# Notable verified controls during this pentest:
# - Three-layer XSS defence: markdown-it html=False + bleach
#   allow-list + reverto.bot strict CSP. Each layer independently
#   sufficient against OWASP cheat-sheet payloads.
# - Single-source sanitisation: every render path (5 callsites in
#   changelog/roadmap admin/public + 2 in marketing_export) goes
#   through render_markdown — no parallel implementation drift.
# - render.js DOM discipline: textContent everywhere except the
#   bleach-output fields; class-name suffix construction strips
#   to lowercase letters.
# - list_published SQL filter at store layer in both stores —
#   drafts cannot leak even if higher layer forgot.
# - changelog public correctly strips raw description (model for
#   the roadmap fix in MK-001).
# - bleach 6.3.0 _ALLOWED_TAGS excludes script/iframe/object/embed/
#   form/style; _ALLOWED_ATTRIBUTES permits only href/title/rel on
#   <a>; _ALLOWED_PROTOCOLS = {http, https, mailto} (javascript:/
#   data:/file: deliberately excluded).
#
# Tracker hygiene: no stale entries identified during this pentest.
# PT-v4-AZ-001 (audit-swap in changelog/roadmap/marketing.py) and
# PT-v4-AZ-003/004 (admin-gate pattern asymmetry) remain open as
# previously triaged.

- finding_id: PT-v4-MK-001
  source_doc: pt-v4-mk-pentest
  severity: LOW
  status: open
  title: _phase_to_public exposes raw body_md alongside rendered body_html (asymmetry with changelog)
  description: |
    core/marketing_export.py:54-66 _phase_to_public and web/routes/roadmap.py:185-208 _phase_to_public_json both expose raw body_md markdown alongside the rendered body_html. The marketing render.js consumes only body_html (render.js:141) — body_md is dead bytes in the public JSON. Slight info-leak surface (admin's raw phrasing visible) plus future foot-gun if a renderer ever reaches for the raw field. The changelog public response correctly drops the raw description field. Suggested fix: drop body_md from _phase_to_public + _phase_to_public_json to match the changelog model.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-MK-002
  source_doc: pt-v4-mk-pentest
  severity: LOW
  status: open
  title: _write_atomic filename parameter unvalidated (path-traversal forward-bug-surface)
  description: |
    core/marketing_export.py:128 _write_atomic(filename, payload) accepts any string as filename. Today's only callers pass safe literals ("roadmap.json", "changelog.json"), but the data dir is publicly served by Caddy file_server. A future caller passing attacker-influenced filename (e.g. "../foo.json" or "evil.html") could write publicly-fetchable files at attacker-chosen paths in /var/www/reverto-marketing/. No exploitation path today; defense-in-depth gap. Suggested fix: 5-line regex check on filename — `re.fullmatch(r"[a-z0-9_-]+\.json", filename)` — at the start of the function.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-MK-003
  source_doc: pt-v4-mk-pentest
  severity: LOW
  status: resolved
  title: Snapshot-failure detection has no alert path (silent swallow)
  description: |
    _snapshot_marketing_roadmap and _snapshot_marketing_changelog wrap export calls in try/except → logger.exception with no audit emission. If marketing_export fails (disk full, permission drift, etc.), the admin operation succeeds but the public site goes stale silently. Operator only notices via portal.log grep or visiting reverto.bot manually. Cheap fix: emit _audit("marketing_snapshot_failed", ...) in the except branches of both wrappers — audit.jsonl is already operator-monitored. RESOLVED 2026-05-04: _audit('marketing_snapshot_save_failed', ...) call added on the snapshot-save except branch (and on the write_*_snapshot returned-False path) in both _snapshot_marketing_roadmap and _snapshot_marketing_changelog wrappers.
  resolution_ref: chore/pt-v4-audit-events-observability
  notes: ""

- finding_id: PT-v4-MK-004
  source_doc: pt-v4-mk-pentest
  severity: INFO
  status: open
  title: POST /api/admin/marketing/regenerate has no per-call concurrency lock
  description: |
    web/routes/marketing.py POST /api/admin/marketing/regenerate has no advisory lock. Two operators (or operator + script) calling simultaneously would have both writes interleave at the _write_atomic level. The os.replace primitive is atomic so neither write is torn, but the LAST-write-wins ordering is non-deterministic — could publish older content over newer. Realistic exploitation requires two concurrent admin invocations; not a security issue but a consistency gap. Suggested fix: asyncio.Lock around the regenerate handler.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-MK-005
  source_doc: pt-v4-mk-pentest
  severity: INFO
  status: open
  title: render.js JSON.parse failure UX undefined
  description: |
    marketing/js/render.js:167 + 246 fetch /data/roadmap.json + /data/changelog.json. If JSON is malformed (manual file edit, partial write during snapshot, etc.), JSON.parse throws and the page silently shows broken state — no error message to the visitor, no fallback content. Suggested fix: try/catch around JSON.parse with a graceful fallback message ("Roadmap temporarily unavailable") rendered into the body. Edge-case, but visible to public users so worth polishing.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-MK-006
  source_doc: pt-v4-mk-pentest
  severity: INFO
  status: open
  title: Cache-busters versioned manually with no enforcement
  description: |
    marketing/*.html references render.js?v=3, marketing.css?v=2, theme-init.js?v=1. Manual version bumps mean a future code change without bump leads to stale cached content for users. tests/test_marketing_assets.py exists but doesn't pin the cache-buster invariant. Defense-in-depth (not security) gap. Suggested fix: add a regression test that asserts: for every marketing/js/*.js and marketing/css/*.css, all reverto.bot HTML files reference it with a ?v= parameter; OR adopt content-hash-based filenames like render.abc123.js to make cache-invalidation automatic.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-MK-007
  source_doc: pt-v4-mk-pentest
  severity: INFO
  status: open
  title: REVERTO_MARKETING_DATA_DIR override has no startup validation
  description: |
    core/marketing_export.py:42 _data_dir reads REVERTO_MARKETING_DATA_DIR env-var with no startup-time validation that the path exists, is writable, and points where the operator intends. Misconfiguration would surface only on first snapshot attempt, after admin operations have been audited but the snapshot silently failed. Suggested fix: at lifespan startup, if REVERTO_MARKETING_DATA_DIR is set, verify Path(override).is_dir() and os.access(path, os.W_OK), or fail-fast with a clear error.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-MK-008
  source_doc: pt-v4-mk-pentest
  severity: INFO
  status: open
  title: Marketing surface structurally well-defended (positive observation)
  description: |
    Pentest probed all 10 attack-vector categories (M1-M10). Marketing/app split is structurally well-defended: three-layer XSS defence (markdown-it html=False + bleach allow-list + strict CSP, each independently sufficient), single-source sanitisation discipline (no parallel renderers), correct draft filtering at the SQL store layer, correct admin/public field-strip via _phase_to_public + _entry_to_public (with the body_md asymmetry noted in MK-001), atomic snapshot writes, no public/admin response field-leak vector found. Findings cluster around defense-in-depth (MK-001, MK-002), observability (MK-003), and polish (MK-004 to MK-007). No structural weaknesses identified.
  resolution_ref: null
  notes: ""

# ── pt-v4-ei-pentest (PT-v4-EI-001 … PT-v4-EI-010) ────────────────────────────
#
# Internal pentest batch covering edge cases and integration boundaries:
# bot subprocess lifecycle, engine ↔ portal integration, Telegram
# notifications, backup/restore flows, schema migrations, and
# cross-component error handling.
# AI-driven adversarial code review by Claude Code on 2026-05-04.
# 10 findings (0 CRITICAL, 0 HIGH, 1 MEDIUM, 4 LOW, 5 INFO).
# See docs/pentests/PT-v4-EI-findings.md for the full report.
#
# This is the FINAL batch in the PT-v4 series. Series total across
# 6 batches (AU, AZ, FS, NW, MK, EI): 0 CRITICAL, 0 HIGH, 5 MEDIUM,
# 17 LOW, 27 INFO. Reverto's single-tenant security posture is solid;
# Phase-4 multi-tenant transition will re-open several findings
# currently in "accepted/single-operator" status.
#
# Notable verified controls during this pentest:
# - Bot lifecycle docstrings unusually rigorous —
#   _persist_silent_exit_reconcile / StateIO.mark_stopped /
#   _persist_stopped_reason_field each have multi-paragraph "do NOT
#   consolidate" warnings. Future refactorers protected.
# - Schema-version read defence-in-depth (type + bounds +
#   forward-compat checks) at _read_schema_version — RESOLVES rha-002
# - _BOT_RESTART_HISTORY growth ceiling at MAX_ENTRIES_PER_BOT=100
#   enforced via single-mutator _record_bot_restart — RESOLVES rha-003
# - Stop-bot timeout math explicitly derived at callsite
#   (NOTIFY_DRAIN_TIMEOUT_S + _STOP_SAFETY_MARGIN_S)
# - WAL-aware backup at TWO sites (backup.sh + _create_pre_migration_backup)
# - 5 truth sources (registry, state.json, PID file, _pid_alive probe,
#   DB deals) reconciled via BotInfo.read_state with documented trust
#   hierarchy
#
# Tracker hygiene as part of this PR:
# - rha-002 flipped open → resolved (3-layer defence in
#   _read_schema_version verified at HEAD)
# - rha-003 flipped open → resolved (MAX_ENTRIES_PER_BOT=100 enforced
#   via _record_bot_restart, docstring explicitly references rha-003)
#
# Cross-batch series observation: documentation-vs-code drift is the
# most common finding class across all 6 batches. Three findings
# stale at HEAD before this PR (rha-002, rha-003, plus pt-025 already
# flipped in PT-v4-NW); reconciliation pass recommended as future
# operator-led sweep.

- finding_id: PT-v4-EI-001
  source_doc: pt-v4-ei-pentest
  severity: LOW
  status: open
  title: backup.sh cp -r credentials not atomic against concurrent Fernet rotation
  description: |
    scripts/backup.sh:88-90 uses cp -r credentials, which is NOT atomic against concurrent rotation. The DB backup uses the WAL-aware sqlite3 .backup API for crash-consistency; credentials don't have an equivalent and could capture a half-rotated state if backup runs during multi-exchange Fernet rotation (extension territory of PT-v4-FS-005). Practical risk low (rotation rare; cron runs at 03:00 UTC), but design asymmetry worth closing. Suggested fix: take an exclusive flock on credentials/<uid>/ during cp, matching the lock the rotation flow already takes; OR snapshot via tar with --acl/--xattrs to a .tmp then rename.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-EI-002
  source_doc: pt-v4-ei-pentest
  severity: MEDIUM
  status: open
  title: backup.sh .last_error monitoring contract only partially implemented
  description: |
    backup.sh:53-57 stamps a .last_error file ONLY on the DB-missing failure path. All other failure paths (sqlite3 .backup error, cp credentials error, MANIFEST write error, retention prune error) silently exit via set -e without updating the stamp. The cron-based monitoring contract documented in the script header is partially broken — operator-side cron monitoring (e.g. checking .last_error mtime) would miss most failure modes. Operator could go weeks with broken backups, only noticing on actual restore. Suggested fix: trap 'echo "$(date)" > "$BACKUP_DIR/.last_error"' EXIT followed by the existing exit logic, ensuring every non-zero exit stamps the file.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-EI-003
  source_doc: pt-v4-ei-pentest
  severity: LOW
  status: open
  title: backup.sh has no concurrent-execution guard
  description: |
    scripts/backup.sh has no flock / lockfile / pid-check protecting against simultaneous executions. Cron at 03:00 UTC + manual operator backup at 03:00:30 UTC = two backups racing on credentials/ + writing same archive name (timestamps at minute precision could collide). Suggested fix: flock -xn /var/lock/reverto-backup.lock at script start; refuse with non-zero exit if lock unavailable.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-EI-004
  source_doc: pt-v4-ei-pentest
  severity: LOW
  status: open
  title: state.json files and config/bots/ NOT in backup (NEW ANGLE on v26-14)
  description: |
    NEW ANGLE on existing finding v26-14 (DB + state.json dual-source). backup.sh captures DB + credentials + keys but NOT state.json files (logs/<uid>/<slug>/state.json) or bot configs (config/bots/<uid>/<slug>.yaml). On restore, the DB is re-hydrated but state.json files land back as whatever was on disk at restore time. Per-bot state (deals, balance, drawdown peak, DCA overrides) drifts with restored DB. Bot configs missing means a restored DB references bots whose config files don't exist on disk. Suggested fix: extend backup.sh to include logs/*/*.state.json + config/bots/ in the tar archive, OR document explicitly that state.json is engine-runtime state not part of backup contract (with operator-facing implications).
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-EI-005
  source_doc: pt-v4-ei-pentest
  severity: LOW
  status: open
  title: TelegramNotifier notify-queue unbounded (forward-looking memory growth)
  description: |
    notifications/telegram.py TelegramNotifier has no upper bound on queued notifications during permanent Telegram API outage. If api.telegram.org is unreachable for hours, the engine continues queuing notifications (open/close/error events) without backpressure. Memory growth bounded only by bot tick rate × outage duration. Single-operator deploys won't hit this in practice; Phase-4 multi-tenant could see memory pressure under widespread outage. Suggested fix: bounded queue (e.g. 1000 items per notifier) with oldest-drop policy; emit one summary _audit() event when drop occurs so operator can see "Telegram down for 3 hours, X notifications dropped".
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-EI-006
  source_doc: pt-v4-ei-pentest
  severity: INFO
  status: resolved
  title: Auto-restart attempts not emitted as audit events
  description: |
    web/app.py _attempt_bot_auto_restart logs to portal.log but does not emit a structured _audit() event. For incident-response timeline reconstruction, an attacker triggering a restart-storm (e.g. by killing the bot subprocess repeatedly) would generate restart-history but no audit trail. Same observability concern as PT-v4-AU-004 (logout no audit) and PT-v4-MK-003 (snapshot-failure no audit). Suggested fix: emit _audit("bot_auto_restart", user_id=user_id, slug=slug, attempt_number=N, reason=...) on every attempt; emit "bot_auto_restart_exhausted" when retry budget hits the cap. RESOLVED 2026-05-04: _audit calls added in _attempt_bot_auto_restart for attempted / budget-exceeded / failed / raised paths (actions: bot_auto_restart_attempted, bot_auto_restart_budget_exceeded, bot_auto_restart_failed).
  resolution_ref: chore/pt-v4-audit-events-observability
  notes: ""

- finding_id: PT-v4-EI-007
  source_doc: pt-v4-ei-pentest
  severity: INFO
  status: open
  title: Heartbeat backwards-compatibility may permanently mask crashed pre-heartbeat bots
  description: |
    web/app.py _heartbeat_is_stale at lines 121-145 returns False (NOT stale) when last_heartbeat field is missing OR has a garbled timestamp. Comment at line 127 acknowledges the backwards-compat reason. A bot that crashed under a pre-heartbeat build and was never restarted would have running=true + no last_heartbeat field forever — the reconcile path would consider it "still running" indefinitely. Practical exposure: the codebase has had heartbeat for many releases and the deploy-pipeline restarts engines on every git pull, so any pre-heartbeat state.json should have aged out. Defense-in-depth concern only. Suggested fix: log WARNING when running=true + no heartbeat field is read, so operator notices pre-heartbeat bots that survived multiple deploys.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-EI-008
  source_doc: pt-v4-ei-pentest
  severity: INFO
  status: open
  title: Notification ordering not guaranteed (open-before-close not enforced)
  description: |
    Bot opens deal at T=0 + queues open-notify; closes deal at T=5s + queues close-notify. If TelegramNotifier sends asynchronously and the open-notify takes longer (slow Telegram API), the user could see CLOSE-notification arrive before OPEN-notification. Confusing for users tracking events in real time but no security or data-integrity impact. Suggested fix: per-bot serialised notification queue (FIFO), OR include a timestamp + sequence number in the message body so user can order them locally.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-EI-009
  source_doc: pt-v4-ei-pentest
  severity: INFO
  status: open
  title: MANIFEST stamps schema-version but not app version (git SHA)
  description: |
    scripts/backup.sh stamps PRAGMA user_version (schema version) into MANIFEST.txt per r3-008. App version (git SHA) is NOT stamped. If the app is upgraded between backup-time and restore-time, the schema might match (no migration in between) but the application logic differs — a backup taken at SHA X restored to SHA Y could expect deal_store invariants that no longer hold. Suggested fix: stamp `git rev-parse HEAD` (or the embedded version-string if one exists) into MANIFEST.txt next to the schema version.
  resolution_ref: null
  notes: ""

- finding_id: PT-v4-EI-010
  source_doc: pt-v4-ei-pentest
  severity: INFO
  status: open
  title: Edge & integration surface structurally well-defended (positive observation)
  description: |
    Pentest probed all 10 attack-vector categories (E1-E10). Bot lifecycle controls are well-thought-out: KillMode=process prevents engine SIGKILL on portal restart, heartbeat-staleness with 6× threshold for silent-exit detection, bounded auto-restart via _BOT_RESTART_HISTORY (rha-003 verified resolved), drain budget + safety margin before SIGKILL escalation, schema migration in transaction with destructive-migrate gate, WAL-aware backup at two sites. The 5 truth sources (registry, state.json, PID file, _pid_alive probe, DB deals) reconcile via documented trust hierarchy at BotInfo.read_state. Findings cluster around BACKUP/RESTORE pipeline (4 of 10) rather than live-system path. Live-system path gets continuous test coverage; backup runs from cron without daily operator scrutiny — an observability gap rather than a structural weakness. No CRITICAL or HIGH findings emerged. Cross-batch series observation: zero CRITICAL/HIGH across all 6 PT-v4 batches confirms structurally solid single-tenant posture.
  resolution_ref: null
  notes: ""
