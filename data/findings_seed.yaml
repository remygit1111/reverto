  status: resolved
  title: Rate-limiter keyed on IP without X-Forwarded-For parsing
  description: |
    The rate-limiter used get_remote_address without trusting X-Forwarded-For. Behind a proxy, all tenants shared one bucket. Custom key_func now parses XFF from trusted proxies.
  resolution_ref: feat/sprint-2-audit-sweep
  notes: ""

