# ruff.toml — Reverto linter configuratie
line-length = 100
# audit_out/ holds throwaway generator scripts for audit .docx reports
# (see audit v23). They're not part of the shipped codebase and carry
# long Dutch prose strings; excluding keeps the real code clean without
# tangling the linter on disposable artefacts.
exclude = ["audit_out"]

[lint]
select = ["E", "F", "W"]
ignore = [
    "E402",  # module imports not at top — intentioneel in main_paper.py (logging eerst)
]

[lint.per-file-ignores]
"tests/*" = [
    "E401",  # multiple imports on one line
    "E701",  # multiple statements on one line (colon)
    "E702",  # multiple statements on one line (semicolon)
    "F401",  # unused imports (pytest, fixtures)
]
